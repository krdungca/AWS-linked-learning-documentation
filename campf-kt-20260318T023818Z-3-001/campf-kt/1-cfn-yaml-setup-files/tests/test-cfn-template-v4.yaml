AWSTemplateFormatVersion: '2010-09-09'
Description: 'Manila-Store Shared Lab: Collaborative VPC Troubleshooting (us-east-1)'

Resources:
  # --- VPC A: The "Cloud" (Web Server) ---
  WebVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: ManilaStore-WebVPC}]

  WebSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: Web-Subnet}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WebVPC
      InternetGatewayId: !Ref InternetGateway

  WebRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebVPC

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref WebRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  WebSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref WebSubnet
      RouteTableId: !Ref WebRouteTable

  # --- VPC B: The "On-Prem" (DB Server) ---
  DatabaseVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 172.16.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: ManilaStore-DataVPC}]

  DataSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DatabaseVPC
      CidrBlock: 172.16.1.0/24
      Tags: [{Key: Name, Value: Data-Subnet}]

  DataRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DatabaseVPC

  DataSubnetAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DataSubnet
      RouteTableId: !Ref DataRouteTable

  # --- Shared EC2 Instances ---
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: 'ami-02dfbd4ff395f2a1b'
      NetworkInterfaces:
        - DeviceIndex: "0"
          AssociatePublicIpAddress: "true"
          SubnetId: !Ref WebSubnet
          PrivateIpAddress: 10.0.1.10
          GroupSet: [!Ref WebSG]
      Tags:
        - Key: Name
          Value: Web-Server (WebVPC)
      UserData:
        Fn::Base64: |
          #!/bin/bash
          sudo yum update -y
          sudo yum install -y httpd php php-mysqlnd
          sudo systemctl start httpd
          sudo systemctl enable httpd

          cat <<'EOF' | sudo tee /var/www/html/index.php
          <?php
          mysqli_report(MYSQLI_REPORT_OFF);

          $db_host = "172.16.1.50"; 
          $db_user = "web_user";
          $db_pass = "ManilaPassword123!";
          $db_name = "manila_store";

          echo "<html><head><meta http-equiv='refresh' content='5'>
          <style>
              body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
              .status-box { padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; min-width: 300px; }
              .on { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
              .off { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; font-weight: bold; font-size: 1.2em; }
              table { margin: 30px auto; border-collapse: collapse; width: 60%; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
              th, td { border: 1px solid #ddd; padding: 12px; }
              th { background-color: #007bff; color: white; }
          </style></head><body>";

          echo "<h1>Manila-Store Dashboard</h1>";

          // Initialize Connection
          $conn = mysqli_init();
          $conn->options(MYSQLI_OPT_CONNECT_TIMEOUT, 2);

          // Attempt connection
          $success = @$conn->real_connect($db_host, $db_user, $db_pass, $db_name);

          $online = true;
          $error_msg = "";

          // Step 1: Check connection
          if (!$success) {
              $online = false;
              $error_msg = mysqli_connect_error() ?: "Connection Timed Out or Blocked";
          }

          // Step 2: Verify DB usability
          if ($online) {
              $test = @$conn->query("SELECT 1");
              if (!$test) {
                  $online = false;
                  $error_msg = $conn->error ?: "Query Failed / DB Not Reachable";
              }
          }

          // FINAL STATUS OUTPUT
          if (!$online) {
              echo "<div class='status-box off'>";
              echo "Database Connectivity: OFFLINE";
              echo "<br><small>Error: " . $error_msg . "</small>";
              echo "</div>";
          } 
          else {
              echo "<div class='status-box on'>";
              echo "Database Connectivity: ONLINE";
              echo "</div>";
              
              $result = $conn->query("SELECT item_name, stock FROM inventory");
              if ($result) {
                  echo "<table><tr><th>Item</th><th>Stock</th></tr>";
                  while($row = $result->fetch_assoc()) { 
                      echo "<tr><td>".$row["item_name"]."</td><td>".$row["stock"]."</td></tr>"; 
                  }
                  echo "</table>";
              }
              $conn->close();
          }

          echo "</body></html>";
          EOF


  DatabaseServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: 'ami-02dfbd4ff395f2a1b'
      NetworkInterfaces:
        - DeviceIndex: "0"
          SubnetId: !Ref DataSubnet
          PrivateIpAddress: 172.16.1.50
          GroupSet: [!Ref DataSG]
      Tags:
        - Key: Name
          Value: Database-Server (DatabaseVPC)
      UserData:
        Fn::Base64: 
          !Sub |
            #!/bin/bash
            # Log output so you can debug at /var/log/user-data.log
            exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1

            echo "Starting UserData script..."
            dnf update -y
            dnf install -y mariadb105-server

            systemctl start mariadb
            systemctl enable mariadb

            # Wait for MariaDB to be ready
            until mariadb-admin ping >/dev/null 2>&1; do
              echo "Waiting for MariaDB..."
              sleep 2
            done

            # Create Database and Tables
            mariadb -e "CREATE DATABASE IF NOT EXISTS manila_store;"
            mariadb -e "CREATE TABLE IF NOT EXISTS manila_store.inventory (id INT AUTO_INCREMENT PRIMARY KEY, item_name VARCHAR(255), stock INT);"
            mariadb -e "INSERT INTO manila_store.inventory (item_name, stock) VALUES ('Laptop', 15), ('Mouse', 50), ('Keyboard', 30);"

            # DYNAMIC IP INJECTION:
            # This uses the Private IP of your 'WebServer' resource (adjust 'WebServer' to your actual logical ID)
            mariadb -e "CREATE USER IF NOT EXISTS 'web_user'@'${WebServer.PrivateIp}' IDENTIFIED BY 'ManilaPassword123!';"
            mariadb -e "GRANT SELECT ON manila_store.* TO 'web_user'@'${WebServer.PrivateIp}';"
            mariadb -e "FLUSH PRIVILEGES;"

            # Remote access config
            echo -e "[mariadb]\nbind-address = 0.0.0.0" > /etc/my.cnf.d/remote_access.cnf
            systemctl restart mariadb
            echo "UserData script finished successfully."

  # --- The "Broken" Components ---
  WebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'FIX ME: Add HTTP Inbound'
      VpcId: !Ref WebVPC

  DataSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'FIX ME: Add MySQL (3306) Inbound'
      VpcId: !Ref DatabaseVPC

Outputs:
  WebURL:
    Description: URL to monitor for the lab
    Value: !Sub http://${WebServer.PublicIp}
  DBPrivateIP:
    Description: Use this to test connectivity from Web Server
    Value: 172.16.1.50
